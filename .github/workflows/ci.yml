name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsodium-dev libseccomp-dev libcurl4-openssl-dev

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          modules: 'qtwebengine qtwebchannel qtpositioning qtserialport'
          cache: true
          aqtversion: '==3.3.*'

      - name: Set QTDIR
        run: |
          QTDIR=$(qmake6 -query QT_INSTALL_PREFIX 2>/dev/null || qmake -query QT_INSTALL_PREFIX)
          echo "QTDIR=$QTDIR" >> "$GITHUB_ENV"

      - name: Build
        run: make build QTDIR="$QTDIR" ARCH=x86-64-v3

      - name: Generate signing keys
        run: ./gm-sign keygen

      - name: Sign and install
        run: make sign install QTDIR="$QTDIR" ARCH=x86-64-v3

      - name: Run tests
        run: make test QTDIR="$QTDIR" ARCH=x86-64-v3
