<style>
/* ── Compact profile ── */
.gh-prof { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 0.78rem; padding: 2px 0 6px; }
.gh-ps { color: var(--dim); white-space: nowrap; }
.gh-ps b { color: var(--cyan); font-weight: normal; }
.gh-contrib { font-size: 0.75rem; color: var(--dim); padding: 2px 0 0; }
.gh-contrib b { color: var(--cyan); font-weight: normal; }

/* ── Tracked repos table ── */
.gh-tbl { width: 100%; border-collapse: collapse; font-size: 0.76rem; margin-top: 2px; }
.gh-tbl th { text-align: left; color: var(--dim); font-weight: normal; font-size: 0.65rem;
  letter-spacing: 0.1rem; padding: 3px 5px; border-bottom: 1px solid var(--border); }
.gh-tbl th.r { text-align: right; }
.gh-tbl td { padding: 4px 5px; border-bottom: 1px solid rgba(0,229,255,0.04); vertical-align: top; }
.gh-tbl td.r { text-align: right; }
.gh-tbl td.nm { color: var(--cyan); max-width: 170px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; }
.gh-tbl td.nm .ow { color: var(--dim); font-size: 0.7rem; }
.gh-tbl .gr { color: var(--green); }
.gh-tbl .dm { color: var(--dim); opacity: 0.4; }
.gh-tbl tr:hover td { background: rgba(0,229,255,0.03); }
.gh-add { text-align: right; margin-top: 8px; }
.gh-add-btn { cursor: pointer; color: var(--dim); font-size: 0.7rem; letter-spacing: 0.15rem;
  padding: 2px 8px; border: 1px solid var(--border); border-radius: 2px; transition: all 0.2s; }
.gh-add-btn:hover { color: var(--cyan); border-color: rgba(0,229,255,0.4); }
.gh-del { cursor: pointer; opacity: 0; color: var(--dim); font-size: 0.6rem;
  padding: 0 3px; transition: opacity 0.2s; }
.gh-tbl tr:hover .gh-del { opacity: 0.5; }
.gh-del:hover { opacity: 1 !important; color: var(--red); }

/* ── Config panel ── */
.gh-cfg-row { display: flex; align-items: center; justify-content: space-between;
  padding: 5px 0; font-size: 0.75rem; }
.gh-cfg-row + .gh-cfg-row { border-top: 1px solid rgba(0,229,255,0.06); }
.gh-cfg-lbl { color: var(--dim); }
.gh-toggle { position: relative; width: 32px; height: 16px; display: inline-block; vertical-align: middle; cursor: pointer; }
.gh-toggle input { opacity: 0; width: 0; height: 0; }
.gh-toggle .sl { position: absolute; inset: 0; background: rgba(0,229,255,0.1); border: 1px solid var(--border);
  border-radius: 8px; transition: all 0.2s; }
.gh-toggle .sl::after { content: ''; position: absolute; left: 2px; top: 2px; width: 10px; height: 10px;
  background: var(--dim); border-radius: 50%; transition: all 0.2s; }
.gh-toggle input:checked + .sl { border-color: rgba(0,229,255,0.4); }
.gh-toggle input:checked + .sl::after { left: 18px; background: var(--cyan); }
.gh-cfg-repos { margin-top: 6px; }
.gh-cfg-repo { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 0.72rem; color: var(--text); }
.gh-cfg-repo .x { cursor: pointer; color: var(--dim); opacity: 0.7; transition: all 0.2s; font-size: 0.65rem; }
.gh-cfg-repo .x:hover { color: var(--red); opacity: 1; }
.gh-cfg-add { display: flex; gap: 6px; margin-top: 8px; }
.gh-cfg-input { flex: 1; background: rgba(0,229,255,0.05); border: 1px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: var(--font); font-size: 0.72rem; padding: 4px 8px; outline: none; }
.gh-cfg-input:focus { border-color: rgba(0,229,255,0.4); }
.gh-cfg-input::placeholder { color: var(--dim); opacity: 0.5; }
.gh-cfg-btn { background: rgba(0,229,255,0.08); border: 1px solid var(--border); border-radius: 2px;
  color: var(--cyan); font-family: var(--font); font-size: 0.7rem; padding: 4px 10px; cursor: pointer;
  letter-spacing: 0.1rem; transition: all 0.2s; }
.gh-cfg-btn:hover { background: rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.4); }
</style>
<script>
(function() {
  var d = (GM.plugins || {}).github;
  var el = document.getElementById('p-github');
  if (!d) { el.innerHTML = '<div class="ph"><div class="ico">\u2298</div><p>GITHUB OFFLINE</p></div>'; return; }

  var html = '';

  /* ── Compact profile stats ── */
  if (d.show_profile !== false) {
    html += '<div class="gh-prof">' +
      '<span class="gh-ps"><b>' + d.repos + '</b> repos</span>' +
      '<span class="gh-ps"><b>' + d.stars + '</b> \u2605</span>' +
      '<span class="gh-ps"><b>' + d.forks + '</b> \u2442</span>' +
      '<span class="gh-ps"><b>' + d.followers + '</b> followers</span>' +
      '<span class="gh-ps"><b>' + d.following + '</b> following</span>' +
      '</div>';
    if (d.contributions != null)
      html += '<div class="gh-contrib"><b>' + d.contributions.toLocaleString() + '</b> contributions this year</div>';
    if (d.tracked && d.tracked.length > 0)
      html += '<div class="sep"></div>';
  }

  /* ── Tracked repos table ── */
  var tracked = d.tracked || [];
  if (tracked.length > 0) {
    /* localStorage growth tracking */
    var SK = 'gm-gh-snap';
    var snaps = {};
    try { snaps = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) {}
    var now = Date.now();

    var cur = {};
    tracked.forEach(function(r) {
      cur[r.repo] = { s: r.stars, f: r.forks, w: r.watchers };
    });
    snaps[now] = cur;

    var cutoff = now - 8 * 86400000;
    Object.keys(snaps).forEach(function(ts) {
      if (parseInt(ts) < cutoff) delete snaps[ts];
    });
    localStorage.setItem(SK, JSON.stringify(snaps));

    function findSnap(targetMs, toleranceMs) {
      var best = null, bestDiff = Infinity;
      Object.keys(snaps).forEach(function(ts) {
        var diff = Math.abs(parseInt(ts) - targetMs);
        if (diff < bestDiff && diff < toleranceMs) { bestDiff = diff; best = snaps[ts]; }
      });
      return best;
    }
    var s24 = findSnap(now - 86400000, 7200000);
    var s7d = findSnap(now - 7*86400000, 43200000);

    function fmt(n) {
      if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n/1000).toFixed(1) + 'k';
      return String(n);
    }
    function delta(val, old, key) {
      if (!old) return '<span class="dm">\u2014</span>';
      var diff = val - (old[key] || 0);
      if (diff > 0) return '<span class="gr">+' + fmt(diff) + '</span>';
      if (diff < 0) return '<span class="rd">' + fmt(diff) + '</span>';
      return '<span class="dm">\u2014</span>';
    }

    html += '<table class="gh-tbl"><thead><tr>' +
      '<th>REPO</th><th class="r">\u2605</th><th class="r">\u2442</th><th class="r">\u25C9</th>' +
      '<th class="r">\u039424H</th><th class="r">\u03947D</th><th></th>' +
      '</tr></thead><tbody>';

    tracked.forEach(function(r) {
      var parts = r.repo.split('/');
      var old24 = s24 ? s24[r.repo] : null;
      var old7 = s7d ? s7d[r.repo] : null;
      html += '<tr>' +
        '<td class="nm"><span class="ow">' + parts[0] + '/</span>' + parts[1] + '</td>' +
        '<td class="r cy">' + fmt(r.stars) + '</td>' +
        '<td class="r">' + fmt(r.forks) + '</td>' +
        '<td class="r">' + fmt(r.watchers) + '</td>' +
        '<td class="r">' + delta(r.stars, old24, 's') + '</td>' +
        '<td class="r">' + delta(r.stars, old7, 's') + '</td>' +
        '<td><span class="gh-del" onclick="ghRm(\'' + r.repo + '\')" title="Remove">\u2715</span></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }

  /* ── Quick add button ── */
  html += '<div class="gh-add"><span class="gh-add-btn" onclick="ghAdd()">+ ADD REPO</span></div>';

  el.innerHTML = html;

  /* ── Populate config panel (gear icon) ── */
  var cfgEl = document.getElementById('cfg-github');
  if (cfgEl) {
    var ch = '';

    /* Toggle: show profile */
    ch += '<div class="gh-cfg-row">' +
      '<span class="gh-cfg-lbl">Show profile stats</span>' +
      '<label class="gh-toggle"><input type="checkbox"' +
      (d.show_profile !== false ? ' checked' : '') +
      ' onchange="ghToggleProfile(this.checked)">' +
      '<span class="sl"></span></label></div>';

    /* Tracked repos list */
    ch += '<div class="gh-cfg-repos">';
    tracked.forEach(function(r) {
      ch += '<div class="gh-cfg-repo">' +
        '<span class="x" onclick="ghRm(\'' + r.repo + '\')" title="Remove">\u2715</span>' +
        '<span>' + r.repo + '</span></div>';
    });
    ch += '</div>';

    /* Add input */
    ch += '<div class="gh-cfg-add">' +
      '<input class="gh-cfg-input" id="gh-add-input" placeholder="owner/repo" ' +
      'onkeydown="if(event.key===\'Enter\')ghAddFromInput()">' +
      '<button class="gh-cfg-btn" onclick="ghAddFromInput()">ADD</button></div>';

    cfgEl.innerHTML = ch;
  }
})();

/* ── Bridge actions ── */
function ghAdd() {
  if (!GM.wm) return;
  var repo = prompt('Enter repository (owner/repo):');
  if (!repo) return;
  repo = repo.trim();
  if (!/^[a-zA-Z0-9][a-zA-Z0-9-]*\/[a-zA-Z0-9._][a-zA-Z0-9._-]*$/.test(repo)) {
    alert('Invalid format. Use: owner/repo'); return;
  }
  GM.wm.appendConfig('github', 'REPO=' + repo);
}

function ghAddFromInput() {
  if (!GM.wm) return;
  var input = document.getElementById('gh-add-input');
  if (!input) return;
  var repo = input.value.trim();
  if (!repo) return;
  if (!/^[a-zA-Z0-9][a-zA-Z0-9-]*\/[a-zA-Z0-9._][a-zA-Z0-9._-]*$/.test(repo)) {
    input.style.borderColor = 'var(--red)';
    setTimeout(function() { input.style.borderColor = ''; }, 1500);
    return;
  }
  GM.wm.appendConfig('github', 'REPO=' + repo);
}

function ghRm(repo) {
  if (!GM.wm) return;
  GM.wm.removeConfigLine('github', 'REPO=' + repo);
}

function ghToggleProfile(on) {
  if (!GM.wm) return;
  GM.wm.setConfigValue('github', 'SHOW_PROFILE', on ? 'true' : 'false');
}
</script>
